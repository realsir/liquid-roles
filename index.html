<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liquid Roles</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #06070b;
      --ink: rgba(255,255,255,.92);
      --grid: rgba(255,255,255,.08);
      --grid-strong: rgba(255,255,255,.13);
      --edge: rgba(255,255,255,.22);

      --liquid: #36a9ff;
      --eye: #ffffff;
      --contributor: #b87333;
      --inner: #0f3b22;
    }

    *{ box-sizing:border-box; }
    html, body{ width:100%; height:100%; }
    body{
      margin:0;
      overflow:hidden;
      background:
        radial-gradient(circle at center, rgba(54,169,255,.10), transparent 36%),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.04), transparent 22%),
        linear-gradient(180deg, #05060a, #090b12 55%, #06070b);
      color:var(--ink);
      font-family:"Nunito", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .stage{
      position:relative;
      width:100%;
      height:100%;
    }

    .bg, .tree, .flash, .burst-layer, .new-layer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    .bg{
      z-index:0;
      pointer-events:none;
      filter:url(#wavyGrid);
      opacity:.98;
    }

    .grid-line{
      fill:none;
      stroke:var(--grid);
      stroke-width:1;
      shape-rendering:geometricPrecision;
    }
    .grid-line.strong{
      stroke:var(--grid-strong);
      stroke-width:1.1;
    }

    .intro{
      position:absolute;
      inset:0;
      z-index:2;
      display:grid;
      place-items:center;
      text-align:center;
      opacity:0;
      transform:translateY(14px) scale(.98);
      transition:opacity 1.2s ease, transform 1.2s ease;
      pointer-events:none;
    }
    .intro.show{
      opacity:1;
      transform:translateY(0) scale(1);
    }
    .intro.hide{
      opacity:0;
      transform:translateY(-10px) scale(1.02);
    }
    .intro h1{
      margin:0;
      font-size:clamp(38px, 6vw, 72px);
      font-weight:900;
      letter-spacing:.03em;
      color:var(--liquid);
      text-shadow:
        0 0 12px rgba(54,169,255,.35),
        0 0 26px rgba(54,169,255,.22),
        0 10px 30px rgba(0,0,0,.28);
      filter:url(#wavyText);
    }

    .tree{
      z-index:1;
      opacity:0;
      transition:opacity 1s ease;
      touch-action:none;
    }
    .tree.show{ opacity:1; }

    .edge{
      fill:none;
      stroke:var(--edge);
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-dasharray:4 8;
      opacity:.65;
      animation: edgeBreathe 8s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes edgeBreathe{
      0%,100%{ opacity:.45; stroke-dashoffset:0; }
      50%{ opacity:.9; stroke-dashoffset:-14; }
    }

    .label{
      font-weight:900;
      font-size:22px;
      dominant-baseline:middle;
      text-anchor:middle;
      paint-order:stroke;
      stroke: rgba(5,6,10,.82);
      stroke-width: 6px;
      stroke-linejoin:round;
      pointer-events:all;
      cursor:grab;
      filter:url(#wavyText);
      transition: transform .9s ease, opacity .9s ease, filter .9s ease;
    }
    .label:active{ cursor:grabbing; }

    .root{ font-size:28px; }

    .t-liquid{ fill:var(--liquid); color:var(--liquid); }

    .explode-out{
      animation: explodeOut .9s ease-out forwards;
    }

    @keyframes explodeOut{
      0%{
        opacity:1;
        transform: translate(0,0) scale(1) rotate(0deg);
        filter:url(#wavyText) drop-shadow(0 0 0 rgba(255,255,255,0));
      }
      35%{
        opacity:1;
        transform: translate(var(--dx, 0px), var(--dy, 0px)) scale(1.25) rotate(var(--rot, 0deg));
        filter:url(#wavyText) drop-shadow(0 0 18px rgba(255,255,255,.9)) drop-shadow(0 0 42px rgba(255,255,255,.45));
      }
      70%{
        opacity:.65;
        transform: translate(calc(var(--dx, 0px) * 1.8), calc(var(--dy, 0px) * 1.8)) scale(1.75) rotate(var(--rot, 0deg));
        filter:url(#wavyText) drop-shadow(0 0 24px rgba(255,255,255,1)) drop-shadow(0 0 70px rgba(255,255,255,.6));
      }
      100%{
        opacity:0;
        transform: translate(calc(var(--dx, 0px) * 2.6), calc(var(--dy, 0px) * 2.6)) scale(2.2) rotate(var(--rot, 0deg));
        filter:url(#wavyText) drop-shadow(0 0 36px rgba(255,255,255,1)) drop-shadow(0 0 90px rgba(255,255,255,.8));
      }
    }

    .flash{
      z-index:4;
      pointer-events:none;
      opacity:0;
      background: radial-gradient(circle at center, rgba(255,255,255,.98), rgba(255,255,255,.72) 18%, rgba(255,255,255,.18) 42%, rgba(255,255,255,0) 70%);
      mix-blend-mode:screen;
      transition: opacity .7s ease;
    }
    .flash.show{ opacity:1; }

    .new-layer{
      z-index:5;
      opacity:0;
      transition:opacity 1s ease;
      pointer-events:none;
    }
    .new-layer.show{ opacity:1; }

    .new-edge{
      fill:none;
      stroke:rgba(255,255,255,.18);
      stroke-width:2;
      stroke-linecap:round;
      stroke-dasharray:5 9;
      opacity:.75;
      animation: newEdgeGlow 2.4s ease-in-out infinite;
    }
    @keyframes newEdgeGlow{
      0%,100%{ opacity:.4; stroke-dashoffset:0; }
      50%{ opacity:1; stroke-dashoffset:-16; }
    }

    .new-label{
      font-weight:900;
      font-size:24px;
      dominant-baseline:middle;
      text-anchor:middle;
      paint-order:stroke;
      stroke: rgba(0,0,0,.65);
      stroke-width: 6px;
      filter:url(#wavyText);
      animation: blinkGlow 1.45s ease-in-out infinite;
    }

    .new-root{
      font-size:30px;
      fill:var(--liquid);
      color:var(--liquid);
      filter:url(#wavyText) drop-shadow(0 0 10px rgba(54,169,255,.65)) drop-shadow(0 0 22px rgba(54,169,255,.28));
    }

    .new-eye{
      fill:var(--eye);
      color:var(--eye);
      filter:url(#wavyText) drop-shadow(0 0 8px rgba(255,255,255,.62)) drop-shadow(0 0 20px rgba(255,255,255,.28));
    }

    .new-contributor{
      fill:var(--contributor);
      color:var(--contributor);
      filter:url(#wavyText) drop-shadow(0 0 8px rgba(184,115,51,.65)) drop-shadow(0 0 22px rgba(184,115,51,.30));
    }

    .new-inner{
      fill:var(--inner);
      color:var(--inner);
      filter:url(#wavyText) drop-shadow(0 0 8px rgba(15,59,34,.72)) drop-shadow(0 0 22px rgba(15,59,34,.34));
    }

    @keyframes blinkGlow{
      0%,100%{ opacity:.82; }
      50%{ opacity:1; }
    }

    .burst-layer{
      z-index:3;
      pointer-events:none;
      opacity:0;
    }

    .burst-particle{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.95);
      box-shadow:
        0 0 10px rgba(255,255,255,.95),
        0 0 24px rgba(255,255,255,.55);
      transform:translate(-50%,-50%);
      animation: particleFly .95s ease-out forwards;
    }

    @keyframes particleFly{
      0%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
      }
      100%{
        opacity:0;
        transform:translate(calc(-50% + var(--px)), calc(-50% + var(--py))) scale(0);
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <svg class="bg" viewBox="0 0 1000 1000" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <filter id="wavyGrid" x="-10%" y="-10%" width="120%" height="120%">
          <feTurbulence id="noiseBg" type="fractalNoise" baseFrequency="0.0125 0.0125" numOctaves="2" seed="8" stitchTiles="stitch" result="turbBg" />
          <feDisplacementMap in="SourceGraphic" in2="turbBg" scale="9" xChannelSelector="R" yChannelSelector="G" />
        </filter>

        <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
          <path d="M 38 0 L 0 0 0 38" class="grid-line"></path>
        </pattern>

        <pattern id="gridStrong" width="190" height="190" patternUnits="userSpaceOnUse">
          <path d="M 190 0 L 0 0 0 190" class="grid-line strong"></path>
        </pattern>
      </defs>
      <rect width="1000" height="1000" fill="url(#grid)"></rect>
      <rect width="1000" height="1000" fill="url(#gridStrong)"></rect>
    </svg>

    <section class="intro" id="intro" aria-live="polite">
      <h1>Liquid Roles</h1>
    </section>

    <svg class="tree" id="tree" viewBox="0 0 1200 780" role="img" aria-label="Liquid Roles tree">
      <defs>
        <filter id="wavyText" x="-30%" y="-60%" width="180%" height="240%">
          <feTurbulence id="noiseText" type="fractalNoise" baseFrequency="0.011 0.011" numOctaves="1" seed="5" stitchTiles="stitch" result="turbText" />
          <feDisplacementMap in="SourceGraphic" in2="turbText" scale="2.8" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>

      <path class="edge old-node" data-from="root" data-to="eduGuild"></path>
      <path class="edge old-node" data-from="root" data-to="designGuild"></path>
      <path class="edge old-node" data-from="root" data-to="traderGuild"></path>

      <path class="edge old-node" data-from="eduGuild" data-to="orator"></path>
      <path class="edge old-node" data-from="orator" data-to="frame"></path>
      <path class="edge old-node" data-from="frame" data-to="drip"></path>

      <path class="edge old-node" data-from="designGuild" data-to="sculptor"></path>
      <path class="edge old-node" data-from="sculptor" data-to="sketch"></path>
      <path class="edge old-node" data-from="sketch" data-to="ink"></path>

      <path class="edge old-node" data-from="traderGuild" data-to="speculator"></path>
      <path class="edge old-node" data-from="speculator" data-to="degen"></path>
      <path class="edge old-node" data-from="degen" data-to="tide"></path>

      <text class="label root t-liquid old-node" data-id="root" x="600" y="220">Liquid Roles</text>

      <text class="label old-node" data-id="eduGuild" x="316" y="362" fill="#f59e0b" style="color:#f59e0b">Educators Guild</text>
      <text class="label old-node" data-id="orator" x="304" y="488" fill="#fb923c" style="color:#fb923c">Orator</text>
      <text class="label old-node" data-id="frame" x="292" y="598" fill="#b45309" style="color:#b45309">Frame</text>
      <text class="label old-node" data-id="drip" x="286" y="708" fill="#7dd3fc" style="color:#7dd3fc">Drip</text>

      <text class="label old-node" data-id="designGuild" x="622" y="396" fill="#38bdf8" style="color:#38bdf8">Designers Guild</text>
      <text class="label old-node" data-id="sculptor" x="640" y="520" fill="#00c2ff" style="color:#00c2ff">Sculptor</text>
      <text class="label old-node" data-id="sketch" x="652" y="630" fill="#374151" style="color:#374151">Sketch</text>
      <text class="label old-node" data-id="ink" x="668" y="740" fill="#2563eb" style="color:#2563eb">Ink</text>

      <text class="label old-node" data-id="traderGuild" x="892" y="362" fill="#60a5fa" style="color:#60a5fa">Traders Guild</text>
      <text class="label old-node" data-id="speculator" x="910" y="488" fill="#f5fcff" style="color:#f5fcff">Speculator</text>
      <text class="label old-node" data-id="degen" x="922" y="598" fill="#fca5a5" style="color:#fca5a5">Degen</text>
      <text class="label old-node" data-id="tide" x="936" y="708" fill="#1d4ed8" style="color:#1d4ed8">Tide</text>
    </svg>

    <svg class="burst-layer" id="burstLayer" aria-hidden="true"></svg>

    <svg class="new-layer" id="newLayer" viewBox="0 0 1200 780" aria-label="New Liquid Roles state">
      <defs>
        <filter id="wavyText2" x="-30%" y="-60%" width="180%" height="240%">
          <feTurbulence type="fractalNoise" baseFrequency="0.0105 0.0105" numOctaves="1" seed="7" stitchTiles="stitch" result="turbText2" />
          <feDisplacementMap in="SourceGraphic" in2="turbText2" scale="2.6" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>

      <path class="new-edge" d="M 600 240 C 540 310, 455 360, 330 460"></path>
      <path class="new-edge" d="M 600 240 C 600 330, 600 370, 600 460"></path>
      <path class="new-edge" d="M 600 240 C 660 310, 745 360, 870 460"></path>

      <text class="new-label new-root" x="600" y="220" style="filter:url(#wavyText2)">Liquid Roles</text>
      <text class="new-label new-eye" x="330" y="455" style="filter:url(#wavyText2)">👀</text>
      <text class="new-label new-contributor" x="600" y="455" style="filter:url(#wavyText2)">Contributor</text>
      <text class="new-label new-inner" x="870" y="455" style="filter:url(#wavyText2)">Inner Circle</text>
    </svg>

    <div class="flash" id="flash"></div>
  </div>

  <script>
    const intro = document.getElementById('intro');
    const tree = document.getElementById('tree');
    const flash = document.getElementById('flash');
    const burstLayer = document.getElementById('burstLayer');
    const newLayer = document.getElementById('newLayer');

    const noiseBg = document.getElementById('noiseBg');
    const noiseText = document.getElementById('noiseText');

    setTimeout(() => intro.classList.add('show'), 400);
    setTimeout(() => {
      intro.classList.remove('show');
      intro.classList.add('hide');
    }, 2600);

    setTimeout(() => tree.classList.add('show'), 3400);

    const speed = (2 * Math.PI) / 3.0;
    const bgBase = 0.0125, bgAmp = 0.00105;
    const textBase = 0.0110, textAmp = 0.00055;
    let phase = 0, last = null, bgx = bgBase, bgy = bgBase, tx = textBase, ty = textBase;
    const tau = 0.22;

    function animate(ts){
      if (last == null) last = ts;
      const dt = Math.min(0.05, (ts - last) / 1000);
      last = ts;
      phase += speed * dt;

      const targetBgX = bgBase + bgAmp * Math.cos(phase);
      const targetBgY = bgBase + bgAmp * Math.sin(phase);
      const targetTx = textBase + textAmp * Math.cos(phase + 0.65);
      const targetTy = textBase + textAmp * Math.sin(phase + 0.65);

      const alpha = 1 - Math.exp(-dt / tau);
      bgx += (targetBgX - bgx) * alpha;
      bgy += (targetBgY - bgy) * alpha;
      tx += (targetTx - tx) * alpha;
      ty += (targetTy - ty) * alpha;

      noiseBg.setAttribute('baseFrequency', bgx.toFixed(5) + ' ' + bgy.toFixed(5));
      noiseText.setAttribute('baseFrequency', tx.toFixed(5) + ' ' + ty.toFixed(5));

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    function svgPointFromEvent(svg, evt){
      const pt = svg.createSVGPoint();
      pt.x = evt.clientX;
      pt.y = evt.clientY;
      const ctm = svg.getScreenCTM();
      if (!ctm) return { x: 0, y: 0 };
      const p = pt.matrixTransform(ctm.inverse());
      return { x: p.x, y: p.y };
    }

    function explodeOldNodes(){
      const nodes = Array.from(tree.querySelectorAll('.old-node'));
      const svgBox = tree.getBoundingClientRect();
      const cx = svgBox.width / 2;
      const cy = svgBox.height / 2;

      flash.classList.add('show');

      nodes.forEach((el, i) => {
        const x = parseFloat(el.getAttribute('x')) || 0;
        const y = parseFloat(el.getAttribute('y')) || 0;
        const dx = (x - 600) * 1.8 + (Math.random() * 120 - 60);
        const dy = (y - 240) * 1.8 + (Math.random() * 120 - 60);
        const rot = (Math.random() * 40 - 20).toFixed(1) + 'deg';
        el.style.setProperty('--dx', dx.toFixed(1) + 'px');
        el.style.setProperty('--dy', dy.toFixed(1) + 'px');
        el.style.setProperty('--rot', rot);
        el.classList.add('explode-out');
      });

      const burstCount = 46;
      for(let i = 0; i < burstCount; i++){
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        p.setAttribute('r', '3.2');
        p.setAttribute('cx', '600');
        p.setAttribute('cy', '240');
        p.setAttribute('fill', 'white');
        p.setAttribute('opacity', '0.95');
        p.setAttribute('filter', 'url(#wavyText)');
        burstLayer.appendChild(p);
      }

      const particles = Array.from(burstLayer.children);
      particles.forEach((p, i) => {
        const angle = (Math.PI * 2 * i) / particles.length;
        const dist = 120 + Math.random() * 220;
        const px = Math.cos(angle) * dist;
        const py = Math.sin(angle) * dist;
        p.classList.add('burst-particle');
        p.style.left = '600px';
        p.style.top = '240px';
        p.style.setProperty('--px', px.toFixed(1) + 'px');
        p.style.setProperty('--py', py.toFixed(1) + 'px');
      });

      setTimeout(() => {
        flash.classList.remove('show');
        burstLayer.innerHTML = '';
        nodes.forEach(n => n.style.visibility = 'hidden');
        tree.querySelectorAll('.edge.old-node').forEach(n => n.style.visibility = 'hidden');
        newLayer.classList.add('show');
      }, 900);
    }

    setTimeout(explodeOldNodes, 6200);

    const nodeEls = new Map();
    for (const el of tree.querySelectorAll('text.label[data-id]')) nodeEls.set(el.dataset.id, el);
    const edges = Array.from(tree.querySelectorAll('path.edge[data-from][data-to]'));
    const saved = {};
    let drag = null;

    function getNodeXY(id){
      const el = nodeEls.get(id);
      return {
        x: parseFloat(el.getAttribute('x')) || 0,
        y: parseFloat(el.getAttribute('y')) || 0
      };
    }

    function buildCubicEdge(a, b){
      const dx = b.x - a.x;
      const bend = Math.max(50, Math.min(220, Math.abs(dx) * 0.34));
      const c1 = { x: a.x + (dx >= 0 ? bend : -bend), y: a.y };
      const c2 = { x: b.x - (dx >= 0 ? bend : -bend), y: b.y };
      return `M ${a.x.toFixed(2)} ${a.y.toFixed(2)} C ${c1.x.toFixed(2)} ${c1.y.toFixed(2)} ${c2.x.toFixed(2)} ${c2.y.toFixed(2)} ${b.x.toFixed(2)} ${b.y.toFixed(2)}`;
    }

    function rebuildEdge(path){
      path.setAttribute('d', buildCubicEdge(getNodeXY(path.dataset.from), getNodeXY(path.dataset.to)));
    }
    function rebuildAllEdges(){ edges.forEach(rebuildEdge); }
    rebuildAllEdges();

    tree.addEventListener('pointerdown', (e) => {
      const target = e.target.closest('text.label[data-id]');
      if (!target) return;
      target.setPointerCapture(e.pointerId);
      const p = svgPointFromEvent(tree, e);
      drag = {
        id: target.dataset.id,
        el: target,
        pointerId: e.pointerId,
        dx: (parseFloat(target.getAttribute('x')) || 0) - p.x,
        dy: (parseFloat(target.getAttribute('y')) || 0) - p.y
      };
      e.preventDefault();
    });

    tree.addEventListener('pointermove', (e) => {
      if (!drag || e.pointerId !== drag.pointerId) return;
      const p = svgPointFromEvent(tree, e);
      drag.el.setAttribute('x', (p.x + drag.dx).toFixed(2));
      drag.el.setAttribute('y', (p.y + drag.dy).toFixed(2));
      edges.forEach(path => {
        if (path.dataset.from === drag.id || path.dataset.to === drag.id) rebuildEdge(path);
      });
      e.preventDefault();
    });

    tree.addEventListener('pointerup', () => { drag = null; });
    tree.addEventListener('pointercancel', () => { drag = null; });
  </script>
</body>
</html>
